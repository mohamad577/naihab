<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Bienvenue</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a0b5a; /* Fond bleu nuit profond */
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Animation du globe */
        .globe-container {
            position: absolute;
            top: 20%;
            z-index: -1;
            width: 300px;
            height: 300px;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Earth_Western_Hemisphere_transparent_background.png/1200px-Earth_Western_Hemisphere_transparent_background.png');
            background-size: cover;
            border-radius: 50%;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 0 30px rgba(103, 58, 183, 0.5);
            animation: rotationGlobe 20s linear infinite;
            opacity: 0.6;
        }

        @keyframes rotationGlobe {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .top-bar {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: flex-end;
            box-sizing: border-box;
        }

        .flag-img {
            width: 35px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .main-content {
            text-align: center;
            z-index: 10;
            margin-top: 50px;
        }

        h1 {
            font-size: 60px;
            margin: 0;
            font-weight: 900;
            letter-spacing: -2px;
            background: linear-gradient(#fff, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slogan {
            font-size: 18px;
            margin: 10px 0 40px 0;
            opacity: 0.9;
            font-weight: 300;
        }

        /* Boutons stylisés Naïhab */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 280px;
            padding: 16px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-create {
            background-color: #ffcc00;
            color: #311b92;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.3);
        }

        .btn-login {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .footer {
            padding-bottom: 30px;
            font-size: 12px;
            text-align: center;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="globe-container"></div>

    <div class="top-bar">
        <img id="flag" class="flag-img" src="https://flagcdn.com/w80/fr.png" alt="Drapeau">
    </div>

    <div class="main-content">
        <h1>Naïhab</h1>
        <p class="slogan">Ta zone, ton style, ta liberté !</p>

        <div class="btn-container">
            <a href="inscription.html" class="btn btn-create">Créer un compte</a>
            <a href="connexion.html" class="btn btn-login">Se connecter</a>
        </div>
    </div>

    <div class="footer">
        <div style="margin-bottom: 10px;">
            <span>Conditions</span> • <span>Politique</span> • <span>Aide</span>
        </div>
        <div>© 2026 Naïhab - Français</div>
    </div>

    <script>
        // Détection auto du drapeau
        fetch('https://ipapi.co/json/')
            .then(res => res.json())
            .then(data => {
                const code = data.country_code.toLowerCase();
                document.getElementById('flag').src = `https://flagcdn.com/w80/${code}.png`;
            })
            .catch(() => {});
    </script>

</body>
</html>
