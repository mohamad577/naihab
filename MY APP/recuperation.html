<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Récupération</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background-color: #1a0b5a; /* Ton bleu nuit Naïhab */
            color: white;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .container { width: 100%; max-width: 350px; }

        .icon-shield {
            font-size: 50px;
            margin-bottom: 20px;
            color: #ffcc00;
        }

        h2 { 
            font-size: 26px; 
            font-weight: 800; 
            margin-bottom: 10px; 
        }

        p { 
            opacity: 0.7; 
            font-size: 14px; 
            margin-bottom: 35px; 
            line-height: 1.5; 
        }

        /* Champ de saisie stylisé */
        input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 30px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 20px;
            font-size: 16px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffcc00;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Bouton Jaune Naïhab */
        .btn-send {
            width: 100%;
            padding: 18px;
            background-color: #ffcc00;
            color: #1a0b5a;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-send:active {
            transform: scale(0.96);
        }

        .back-link { 
            margin-top: 25px; 
            display: block; 
            color: #ffcc00; 
            text-decoration: none; 
            font-size: 14px;
            font-weight: bold;
            opacity: 0.8; 
        }

        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-shield">🛡️</div>
        <h2>Récupère ton compte</h2>
        <p>Pas de panique ! Saisis ton email ou ton numéro pour recevoir un lien de réinitialisation.</p>
        
        <input type="text" placeholder="Email ou numéro de téléphone">
        
        <button class="btn-send" onclick="window.location.href='nouveau-mdp.html'">ENVOYER LE LIEN</button>
        
        <a href="connexion.html" class="back-link">← Retour à la connexion</a>
    </div>

</body>
</html>
