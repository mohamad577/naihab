<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Explorer</title>
    <style>
        :root {
            --bg-deep: #1a0b5a;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            padding-bottom: 90px; 
        }
        
        .search-container { 
            padding: 15px 20px; 
            background: rgba(26, 11, 90, 0.9); 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(15px);
        }

        .search-wrapper { position: relative; display: flex; align-items: center; }
        
        .search-bar { 
            width: 100%; 
            background: var(--glass); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 15px 12px 40px; 
            border-radius: 15px; 
            color: white; 
            outline: none; 
            font-size: 15px; 
        }

        .search-icon { position: absolute; left: 15px; opacity: 0.5; }

        /* Style des résultats utilisateurs */
        .user-item-result { 
            background: rgba(255,255,255,0.05);
            margin: 10px 20px;
            border-radius: 15px;
            align-items: center;
            border: 1px solid rgba(255,204,0,0.1);
        }

        /* Grille d'images */
        .search-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 2px; 
            padding: 2px; 
            margin-top: 10px;
        }
        .grid-item { position: relative; width: 100%; padding-top: 100%; background: #0d124a; }
        .grid-item img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

        /* Navigation basse */
        .nav-bas { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: #0d124a; display: flex; justify-content: space-around; align-items: center; z-index: 100; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-link { text-decoration: none; font-size: 24px; color: white; opacity: 0.4; }
        .nav-link.active { opacity: 1; color: var(--gold); }
    </style>
</head>
<body>

    <div class="search-container">
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher un Naïfan..." oninput="filtrerTout()">
        </div>
    </div>

    <div id="resultsContainer">
        <div class="user-item-result" data-name="marc_king" style="display: none; cursor: pointer;" 
             onclick="window.location.href='profil-public.html?name=Marc_King&img=https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400'">
            <div style="padding:15px; display:flex; justify-content:space-between; width:100%; align-items:center;">
                <b>Marc_King 👑</b>
                <span style="color:var(--gold)">VOIR ❯</span>
            </div>
        </div>

        <div class="user-item-result" data-name="angela_queen" style="display: none; cursor: pointer;" 
             onclick="window.location.href='profil-public.html?name=Angela_Queen&img=https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400'">
            <div style="padding:15px; display:flex; justify-content:space-between; width:100%; align-items:center;">
                <b>Angela_Queen 👑</b>
                <span style="color:var(--gold)">VOIR ❯</span>
            </div>
        </div>
    </div>

    <div id="noResults" style="display: none; text-align: center; margin-top: 50px; opacity: 0.5;">
        <p>Aucun Naïfan trouvé... 🔍</p>
    </div>

    <div class="search-grid" id="searchGrid">
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=400"></div>
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400"></div>
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=400"></div>
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1551434678-e076c223a692?w=400"></div>
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=400"></div>
        <div class="grid-item"><img src="https://images.unsplash.com/photo-1523240715639-9a67a0e71d0b?w=400"></div>
    </div>

    <nav class="nav-bas">
        <a href="chats.html" class="nav-link">🏠</a>
        <a href="recherche.html" class="nav-link active">🔍</a>
        <a href="videos.html" class="nav-link">▶️</a>
        <a href="notifications.html" class="nav-link">🔔</a>
        <a href="profil.html" class="nav-link">👤</a>
    </nav>

    <script>
        function filtrerTout() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let profiles = document.getElementsByClassName('user-item-result');
            let grid = document.getElementById('searchGrid');
            let noResults = document.getElementById('noResults');
            let hasVisibleProfile = false;

            // Si on commence à taper (2 lettres ou plus)
            if (input.length >= 2) {
                grid.style.display = "none"; // On cache les photos de découverte
                
                for (let i = 0; i < profiles.length; i++) {
                    let name = profiles[i].getAttribute('data-name').toLowerCase();
                    if (name.includes(input)) {
                        profiles[i].style.display = "flex";
                        hasVisibleProfile = true;
                    } else {
                        profiles[i].style.display = "none";
                    }
                }
                
                // Afficher "Aucun résultat" si besoin
                noResults.style.display = hasVisibleProfile ? "none" : "block";

            } else {
                // Si la barre est vide ou < 2 lettres
                grid.style.display = "grid"; // On remet les photos
                noResults.style.display = "none";
                for (let i = 0; i < profiles.length; i++) {
                    profiles[i].style.display = "none"; // On cache les profils
                }
            }
        }
    </script>
</body>
</html>
