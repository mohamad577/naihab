<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Commentaires</title>
    <style>
        :root {
            --bg-deep: #1a0b5a;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        /* En-tête Premium */
        .header { 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        
        .back-btn { 
            text-decoration: none; 
            font-size: 22px; 
            color: var(--gold); 
            cursor: pointer; 
            background: none;
            border: none;
            padding: 0;
        }

        /* Zone des commentaires */
        .comments-list { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }

        .comment-item { 
            display: flex; 
            gap: 12px; 
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .user-avatar { 
            width: 36px; 
            height: 36px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 1.5px solid var(--gold); 
        }

        /* Avatar de remplacement stylé */
        .default-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 14px; color: white;
            border: 1.5px solid var(--gold);
        }
        
        /* Bulle de commentaire version Glassmorphism */
        .comment-bubble { 
            background: var(--glass); 
            padding: 12px 16px; 
            border-radius: 18px; 
            border-top-left-radius: 2px;
            flex: 1; 
            border: 1px solid rgba(255,255,255,0.03);
        }
        
        .comment-bubble b { 
            display: block; 
            font-size: 13px; 
            margin-bottom: 4px; 
            color: var(--gold); 
            letter-spacing: 0.5px;
        }
        
        .comment-bubble p { 
            margin: 0; 
            font-size: 14px; 
            color: rgba(255,255,255,0.9); 
            line-height: 1.5; 
        }

        /* Barre de saisie fixe en bas */
        .input-area { 
            padding: 15px; 
            background: rgba(13, 18, 74, 0.95); 
            display: flex; 
            gap: 12px; 
            align-items: center; 
            padding-bottom: 30px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .comment-input { 
            flex: 1; 
            background: rgba(255,255,255,0.07); 
            border: 1px solid rgba(255,255,255,0.1); 
            padding: 12px 18px; 
            border-radius: 25px; 
            color: white; 
            outline: none; 
            font-size: 14px; 
            transition: 0.3s;
        }
        
        .comment-input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.12);
        }

        .publish-btn { 
            background: var(--gold); 
            border: none; 
            color: var(--bg-deep); 
            font-weight: 800; 
            font-size: 13px; 
            cursor: pointer; 
            padding: 10px 18px; 
            border-radius: 20px;
            transition: 0.2s; 
            text-transform: uppercase;
        }
        
        .publish-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="window.history.back()">⬅️</button>
        <h3 style="margin:0; font-size: 18px; font-weight: 900;">Commentaires</h3>
    </div>

    <div class="comments-list" id="zone-commentaires">
        <div class="comment-item">
            <div class="default-avatar" style="background:#e67e22;">J</div>
            <div class="comment-bubble">
                <b>Jackson</b>
                <p>Superbe application ! J'adore le design bleu nuit. 🔥</p>
            </div>
        </div>

        <div class="comment-item">
            <div class="default-avatar" style="background:#2ecc71;">N</div>
            <div class="comment-bubble">
                <b>Naïfan_99</b>
                <p>Est-ce qu'on pourra bientôt envoyer des vidéos ? 🌍</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="mon-commentaire" class="comment-input" placeholder="Ajouter un commentaire..." onkeypress="if(event.key==='Enter') publier()">
        <button class="publish-btn" onclick="publier()">Publier</button>
    </div>

<script>
    const monNom = localStorage.getItem("user_name") || "Moi";
    const maPhoto = localStorage.getItem("user_photo");

    // ✅ Charger les commentaires sauvegardés
    window.onload = function() {
        const commentairesSauvegardes = JSON.parse(localStorage.getItem('naihab_commentaires')) || [];
        commentairesSauvegardes.forEach((c, index) => afficherCommentaire(c, index, false));
    };

    // ✅ Afficher un commentaire
    function afficherCommentaire(c, index, sauvegarder = true) {
        const zone = document.getElementById('zone-commentaires');
        const estMoi = c.nom === monNom;

        let avatarHTML = c.photo
            ? `<img src="${c.photo}" class="user-avatar">`
            : `<div class="default-avatar" style="background:#ffcc00; color:#1a0b5a;">${c.nom.charAt(0).toUpperCase()}</div>`;

        const div = document.createElement('div');
        div.className = 'comment-item';
        div.id = 'comment-' + index;
        div.innerHTML = `
            ${avatarHTML}
            <div class="comment-bubble" style="flex:1;">
                <b>${c.nom}</b>
                <p>${c.texte}</p>
            </div>
            ${estMoi ? `<span onclick="supprimerCommentaire(${index})" style="font-size:18px; opacity:0.4; cursor:pointer; padding:5px; align-self:center;">🗑️</span>` : ''}
        `;

        zone.appendChild(div);
        zone.scrollTo({ top: zone.scrollHeight, behavior: 'smooth' });

        if (sauvegarder) {
            const commentairesSauvegardes = JSON.parse(localStorage.getItem('naihab_commentaires')) || [];
            commentairesSauvegardes.push(c);
            localStorage.setItem('naihab_commentaires', JSON.stringify(commentairesSauvegardes));
        }
    }

    // ✅ Publier un commentaire
    function publier() {
        const input = document.getElementById('mon-commentaire');
        const texte = input.value.trim();
        if (texte !== "") {
            const commentairesSauvegardes = JSON.parse(localStorage.getItem('naihab_commentaires')) || [];
            const index = commentairesSauvegardes.length;
            afficherCommentaire({ nom: monNom, photo: maPhoto, texte: texte }, index, true);
            input.value = "";
        }
    }

    // ✅ Supprimer un commentaire
    function supprimerCommentaire(index) {
        if (confirm("Supprimer ce commentaire ?")) {
            let commentaires = JSON.parse(localStorage.getItem('naihab_commentaires')) || [];
            commentaires.splice(index, 1);
            localStorage.setItem('naihab_commentaires', JSON.stringify(commentaires));
            // Recharger la page pour mettre à jour les index
            location.reload();
        }
    }
</script>
</body>
</html>
