<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Discussion</title>
    <style>
        :root {
            --bg-deep: #1a0b5a;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { 
            display: flex; 
            align-items: center; 
            padding: 15px 20px; 
            background: rgba(13, 18, 74, 0.95);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .back-btn { text-decoration: none; font-size: 24px; color: var(--gold); margin-right: 15px; cursor: pointer; }
        .contact-info { display: flex; align-items: center; gap: 12px; cursor: pointer; flex: 1; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
        .status-dot { width: 8px; height: 8px; background: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 5px; }

        .chat-box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
        }

        .msg { 
            max-width: 75%; 
            padding: 12px 16px; 
            border-radius: 20px; 
            font-size: 14px; 
            line-height: 1.4; 
            animation: apparaitre 0.3s ease;
        }

        @keyframes apparaitre {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .envoye { 
            align-self: flex-end; 
            background: var(--gold); 
            color: #1a0b5a; 
            font-weight: 600; 
            border-bottom-right-radius: 5px; 
        }

        .recu { 
            align-self: flex-start; 
            background: rgba(255,255,255,0.08); 
            color: white; 
            border-bottom-left-radius: 5px; 
            border: 1px solid rgba(255,255,255,0.1); 
        }

        .msg-status { 
            font-size: 10px; 
            text-align: right; 
            margin-top: 4px; 
            opacity: 0.7;
        }

        .msg-img { 
            max-width: 100%; 
            border-radius: 12px; 
            display: block; 
            margin-top: 5px;
        }

        .input-area { 
            padding: 12px 15px; 
            background: #0d124a; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-bar { 
            flex: 1; 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 25px; 
            padding: 12px 20px; 
            color: white; 
            outline: none;
            font-size: 14px;
        }
        .input-bar:focus { border-color: var(--gold); }

        .send-btn { 
            background: var(--gold); 
            border: none; 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            display: flex; justify-content: center; align-items: center; 
            cursor: pointer; 
            font-size: 20px;
            transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        .photo-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            width: 45px; height: 45px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
        }
        .photo-btn:active { background: rgba(255,204,0,0.2); }
    </style>
</head>
<body>

    <div class="header">
        <span onclick="window.history.back()" class="back-btn">⇠</span>
        <div class="contact-info" onclick="allerAuProfil()">
            <img src="https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=100" class="avatar" id="chat-avatar">
            <div>
                <b id="chat-username">Utilisateur</b>
                <div style="font-size: 11px; opacity: 0.6;"><span class="status-dot"></span> En ligne</div>
            </div>
        </div>
        <span style="font-size: 20px; opacity: 0.5; cursor:pointer;">⋮</span>
    </div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="file" id="input-photo" accept="image/*" style="display:none" onchange="envoyerPhoto(event)">
        <div class="photo-btn" onclick="document.getElementById('input-photo').click()">📷</div>
        <input type="text" id="monMessage" class="input-bar" placeholder="Écrire..." onkeypress="verifierEntree(event)">
        <button class="send-btn" onclick="envoyer()">➤</button>
    </div>

<script>
    let nomActuel = "";
    let photoActuelle = "";
    let cleConversation = "";

    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        nomActuel = urlParams.get('name') || "Utilisateur";
        photoActuelle = urlParams.get('img');

        cleConversation = "naihab_chat_" + nomActuel.toLowerCase().replace(/\s/g, '_');

        if (nomActuel) {
            document.getElementById('chat-username').innerText = nomActuel;
            document.getElementById('monMessage').placeholder = "Écrire à " + nomActuel + "...";
        }
        if (photoActuelle) {
            document.getElementById('chat-avatar').src = photoActuelle;
        }

        chargerMessages();
    };

    function chargerMessages() {
        const zone = document.getElementById('chatBox');
        const messagesSauvegardes = JSON.parse(localStorage.getItem(cleConversation)) || [];
        
        if (messagesSauvegardes.length === 0) {
            const bienvenue = document.createElement('div');
            bienvenue.className = "msg recu";
            bienvenue.innerHTML = `Salut ! Bienvenue sur Naïhab 👑<div class="msg-status">✓</div>`;
            zone.appendChild(bienvenue);
        } else {
            messagesSauvegardes.forEach(msg => afficherMessage(msg, false));
        }
        zone.scrollTop = zone.scrollHeight;
    }

    function afficherMessage(msg, sauvegarder = true) {
        const zone = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = "msg " + msg.type;

        if (msg.typeContenu === 'image') {
            div.innerHTML = `<img src="${msg.contenu}" class="msg-img">
                             <div class="msg-status">${msg.type === 'envoye' ? '✓✓ Lu' : ''}</div>`;
        } else {
            div.innerHTML = `${msg.contenu}
                             <div class="msg-status">${msg.type === 'envoye' ? '✓✓ Lu' : ''}</div>`;
        }

        zone.appendChild(div);
        zone.scrollTo({ top: zone.scrollHeight, behavior: 'smooth' });

        if (sauvegarder) {
            const messagesSauvegardes = JSON.parse(localStorage.getItem(cleConversation)) || [];
            messagesSauvegardes.push(msg);
            localStorage.setItem(cleConversation, JSON.stringify(messagesSauvegardes));
        }
    }

    function envoyer() {
        const champ = document.getElementById('monMessage');
        const texte = champ.value.trim();
        if (texte !== "") {
            afficherMessage({ type: 'envoye', typeContenu: 'texte', contenu: texte });
            champ.value = "";
        }
    }

    function envoyerPhoto(event) {
        const fichier = event.target.files[0];
        if (fichier) {
            const reader = new FileReader();
            reader.onload = function(e) {
                afficherMessage({ type: 'envoye', typeContenu: 'image', contenu: e.target.result });
            };
            reader.readAsDataURL(fichier);
        }
    }

    function verifierEntree(event) {
        if (event.key === "Enter") envoyer();
    }

    function allerAuProfil() {
        const nom = document.getElementById('chat-username').innerText.replace(' 👑', '');
        const photo = document.getElementById('chat-avatar').src;
        if (nom && photo) {
            window.location.href = `profil-public.html?name=${nom}&img=${photo}`;
        } else {
            window.history.back();
        }
    }
</script>

</body>
</html>
