<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Notifications</title>
    <style>
        :root {
            --bg-deep: #1a0b5a;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
            --danger: #ff5252;
        }

        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            font-family: 'Segoe UI', sans-serif; 
            color: white; 
            padding-bottom: 90px;
            overflow-x: hidden;
        }
        
        /* Header Premium */
        .header { 
            padding: 20px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            background: rgba(26, 11, 90, 0.95); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .titre { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }

        /* Notifications Items */
        .notif-item { 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            padding: 20px 15px; 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            background: rgba(255,255,255,0.01);
        }
        
        .avatar-notif { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 1.5px solid var(--gold); 
        }

        .icon-cercle { 
            width: 45px; height: 45px; 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 20px; 
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .content { flex: 1; }
        .message { font-size: 14px; line-height: 1.4; }
        .message b { color: var(--gold); font-weight: 700; }
        .temps { font-size: 11px; opacity: 0.4; margin-top: 4px; }

        .btn-delete { 
            color: rgba(255,255,255,0.15); 
            font-size: 22px; 
            cursor: pointer; 
            padding: 5px;
            transition: 0.2s;
        }
        .btn-delete:active { color: var(--danger); transform: scale(0.9); }

        /* État vide stylé */
        #empty-msg { 
            text-align: center; 
            padding: 80px 20px; 
            opacity: 0.5; 
            display: none; 
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 0.5; } }

        /* Navigation Basse Harmonisée */
        .nav-bas { 
            position: fixed; bottom: 0; width: 100%; height: 75px; 
            background: #0d124a; 
            display: flex; justify-content: space-around; align-items: center; 
            z-index: 1000; border-top: 1px solid rgba(255,255,255,0.08); 
        }

        .nav-link { text-decoration: none; font-size: 24px; color: white; opacity: 0.4; position: relative; transition: 0.3s; }
        .nav-link.active { color: var(--gold); opacity: 1; transform: translateY(-3px); }
        
        #badge-notif { 
            position: absolute; top: -5px; right: -10px; 
            background: var(--danger); color: white; 
            font-size: 10px; padding: 2px 6px; 
            border-radius: 10px; font-weight: 900; 
            border: 2px solid #0d124a; 
            transition: 0.3s;
        }
    </style>
</head>
<body>

    <header class="header">
        <span class="titre">Notifications</span>
        <span style="font-size: 12px; color: var(--gold); font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px;" onclick="ToutLire()">Tout lire</span>
    </header>

    <div id="liste-notifs"></div>

    <div id="empty-msg" style="text-align: center; padding: 80px 20px; opacity: 0.5;">
        <div style="font-size: 50px; margin-bottom: 15px;">🔔</div>
        <p style="font-weight: 600;">Pas encore de notifications</p>
        <p style="font-size: 13px;">Tes notifications apparaîtront ici</p>
    </div>

    <nav class="nav-bas">
        <a href="chats.html" class="nav-link">🏠</a>
        <a href="recherche.html" class="nav-link">🔍</a>
        <a href="videos.html" class="nav-link">▶️</a>
        <a href="notifications.html" class="nav-link active">
            🔔<span id="badge-notif">3</span>
        </a>
        <a href="profil.html" class="nav-link">👤</a>
    </nav>

    <script>
        // ✅ Charger les notifications depuis localStorage
        window.onload = function() {
            const notifs = JSON.parse(localStorage.getItem('naihab_notifs')) || [];
            const liste = document.getElementById('liste-notifs');
            const badge = document.getElementById('badge-notif');
            const emptyMsg = document.getElementById('empty-msg');

            if (notifs.length > 0) {
                emptyMsg.style.display = 'none';
                notifs.forEach((notif, index) => {
                    const div = document.createElement('div');
                    div.className = 'notif-item';
                    div.innerHTML = `
                        <div class="icon-cercle" style="background: rgba(255,255,255,0.1);">${notif.icone}</div>
                        <div class="content">
                            <div class="message">${notif.message}</div>
                            <div class="temps">${notif.temps}</div>
                        </div>
                        <span class="btn-delete" onclick="supprimerNotif(this)">×</span>
                    `;
                    liste.appendChild(div);
                });
                if (badge) badge.innerText = notifs.length;
            } else {
                emptyMsg.style.display = 'block';
                if (badge) badge.style.display = 'none';
            }

            // ✅ Vérifier si tu as gagné la couronne
            const gagnant = JSON.parse(localStorage.getItem('naihab_gagnant_couronne'));
            const nomUser = localStorage.getItem('user_name') || '';
            if (gagnant && gagnant.auteur === nomUser) {
                ajouterNotif('🏆', '<b>Système</b> : Tu as gagné la couronne cette session ! 👑', 'Maintenant');
            }
        };

        // ✅ Ajouter une notification
        function ajouterNotif(icone, message, temps) {
            const liste = document.getElementById('liste-notifs');
            const emptyMsg = document.getElementById('empty-msg');
            const badge = document.getElementById('badge-notif');

            emptyMsg.style.display = 'none';
            const div = document.createElement('div');
            div.className = 'notif-item';
            div.innerHTML = `
                <div class="icon-cercle" style="background: linear-gradient(135deg, #ffcc00, #ff9900); color: #1a0b5a;">${icone}</div>
                <div class="content">
                    <div class="message">${message}</div>
                    <div class="temps">${temps}</div>
                </div>
                <span class="btn-delete" onclick="supprimerNotif(this)">×</span>
            `;
            liste.prepend(div);
            if (badge) {
                badge.style.display = 'block';
                badge.innerText = document.querySelectorAll('.notif-item').length;
            }
        }

        function ToutLire() {
            const badge = document.getElementById('badge-notif');
            if (badge) {
                badge.style.transform = "scale(0)";
                setTimeout(() => badge.style.display = 'none', 300);
            }
        }

        function supprimerNotif(element) {
            const item = element.parentElement;
            const badge = document.getElementById('badge-notif');
            
            item.style.opacity = "0";
            item.style.transform = "translateX(100px)";
            
            setTimeout(() => {
                item.remove();
                let count = document.querySelectorAll('.notif-item').length;
                if (badge) {
                    badge.innerText = count;
                    if (count === 0) badge.style.display = 'none';
                }
                if (count === 0) {
                    document.getElementById('empty-msg').style.display = 'block';
                }
            }, 400);
        }
    </script>

</body>
</html>
