<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naïhab - Sécurité</title>
    <style>
        :root { --bg-deep: #1a0b5a; --gold: #ffcc00; }
        body { margin: 0; background-color: var(--bg-deep); font-family: 'Segoe UI', sans-serif; color: white; }
        .header { padding: 20px; display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .container { padding: 20px; }
        .card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.03); }
        label { display: block; color: var(--gold); font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        .btn-save { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 25px; color: #1a0b5a; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn-save:active { transform: scale(0.97); }
        .error { color: #ff5252; font-size: 13px; margin-top: -10px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="header">
        <span onclick="window.history.back()" style="cursor:pointer; color: var(--gold); font-size: 20px;">⬅️</span>
        <b style="font-size: 18px; font-weight: 900;">Sécurité</b>
    </div>
    <div class="container">
        <div class="card">
            <label>Mot de passe actuel</label>
            <input type="password" id="mdp-actuel" placeholder="Ton mot de passe actuel">
            <label>Nouveau mot de passe</label>
            <input type="password" id="mdp-nouveau" placeholder="Minimum 8 caractères">
            <label>Confirmer le nouveau</label>
            <input type="password" id="mdp-confirm" placeholder="Répète le nouveau mot de passe">
            <p class="error" id="msg-erreur"></p>
            <button class="btn-save" onclick="changerMdp()">Changer le mot de passe</button>
        </div>
    </div>

    <script>
        function changerMdp() {
            const actuel = document.getElementById('mdp-actuel').value;
            const nouveau = document.getElementById('mdp-nouveau').value;
            const confirm = document.getElementById('mdp-confirm').value;
            const erreur = document.getElementById('msg-erreur');
            const mdpSauve = localStorage.getItem('user_mdp') || '';

            erreur.style.display = 'none';

            if (!actuel || !nouveau || !confirm) {
                erreur.innerText = "Remplis tous les champs !";
                erreur.style.display = 'block';
                return;
            }
            if (actuel !== mdpSauve) {
                erreur.innerText = "Mot de passe actuel incorrect !";
                erreur.style.display = 'block';
                return;
            }
            if (nouveau.length < 8) {
                erreur.innerText = "Le nouveau mot de passe doit avoir au moins 8 caractères !";
                erreur.style.display = 'block';
                return;
            }
            if (nouveau !== confirm) {
                erreur.innerText = "Les deux nouveaux mots de passe ne sont pas identiques !";
                erreur.style.display = 'block';
                return;
            }

            localStorage.setItem('user_mdp', nouveau);
            alert("Mot de passe mis à jour avec succès ! 🎉");
            window.history.back();
        }
    </script>
</body>
</html>
