<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Profil - Naïhab</title>
    <style>
        :root {
            --bg-deep: #1a0b5a;
            --gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            margin: 0; 
            background-color: var(--bg-deep); 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        /* Header avec bouton fermer */
        .back-link { 
            width: 100%; 
            padding: 20px 25px; 
            display: flex;
            justify-content: flex-start;
            box-sizing: border-box; 
        }

        .close-btn {
            text-decoration: none; 
            font-size: 26px; 
            color: var(--gold); 
            font-weight: 300;
            transition: 0.3s;
        }

        .container { 
            width: 90%; 
            max-width: 400px; 
            text-align: center; 
            padding-bottom: 40px; 
        }
        
        /* Avatar avec bague dorée */
        .photo-wrapper { 
            position: relative; 
            width: 130px; 
            height: 130px; 
            margin: 0 auto 10px; 
        }

        #preview-photo { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            border: 3px solid var(--gold); 
            object-fit: cover; 
            background: #0d124a; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        
        /* Inputs Stylisés */
        .input-group { margin-top: 25px; text-align: left; }
        .input-group label { 
            display: block; 
            margin-bottom: 10px; 
            font-size: 11px; 
            font-weight: 800; 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding-left: 5px;
        }
        
        input, textarea { 
            width: 100%; 
            padding: 18px; 
            border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.08); 
            background: rgba(255,255,255,0.03); 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        input:focus, textarea:focus {
            outline: none; 
            border-color: var(--gold); 
            background: rgba(255,255,255,0.07);
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }

        textarea { height: 110px; resize: none; line-height: 1.5; }

        /* Bouton Galerie discret */
        .btn-galerie { 
            background: none;
            color: var(--gold); 
            padding: 8px 15px; 
            cursor: pointer; 
            display: inline-block; 
            margin-bottom: 20px; 
            font-size: 13px; 
            font-weight: 600;
            border-radius: 10px;
            transition: 0.2s;
        }
        .btn-galerie:active { background: rgba(255,204,0,0.1); }
        
        /* Bouton de sauvegarde royal */
        .btn-save { 
            background: linear-gradient(135deg, var(--gold), #ff9900); 
            color: var(--bg-deep); 
            border: none; 
            padding: 18px; 
            border-radius: 20px; 
            font-weight: 900; 
            width: 100%; 
            margin-top: 40px;
            cursor: pointer; 
            font-size: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 20px rgba(255, 204, 0, 0.2); 
            transition: 0.3s; 
        }
        .btn-save:active { transform: scale(0.96); opacity: 0.9; }

    </style>
</head>
<body>

    <div class="back-link">
        <a href="#" onclick="window.history.back(); return false;" class="close-btn">✕</a>
    </div>

    <div class="container">
        <h2 style="margin-bottom: 35px; font-weight: 900; letter-spacing: -0.5px;">Éditer le profil</h2>
        
        <div class="photo-wrapper">
            <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="preview-photo">
        </div>

        <label class="btn-galerie">
            ✨ Changer de photo
            <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="aperçuImage(event)">
        </label>

        <!-- ✅ Bouton supprimer la photo -->
        <div id="btn-supprimer" style="display:none; margin-bottom: 10px;">
            <span onclick="supprimerPhoto()" style="color:#ff5252; font-size:13px; font-weight:600; cursor:pointer;">🗑️ Supprimer la photo</span>
        </div>

        <div class="input-group">
            <label>Pseudo Naïfan</label>
            <input type="text" id="edit-nom" placeholder="@votre_pseudo">
        </div>

        <div class="input-group">
            <label>Votre Biographie</label>
            <textarea id="edit-bio" placeholder="Ex: Voyageur, photographe et fan de Naïhab..."></textarea>
        </div>

        <button class="btn-save" id="save-btn" onclick="sauvegarderProfil()">Mettre à jour</button>
    </div>

<script>
    let photoBase64 = "";

    // Charger les données dès l'ouverture
    window.onload = function() {
        const nomSauve = localStorage.getItem("user_name");
        const bioSauve = localStorage.getItem("user_bio");
        const photoSauve = localStorage.getItem("user_photo");

        if (nomSauve) document.getElementById("edit-nom").value = nomSauve;
        if (bioSauve) document.getElementById("edit-bio").value = bioSauve;
        if (photoSauve) {
            document.getElementById("preview-photo").src = photoSauve;
            document.getElementById("btn-supprimer").style.display = "block";
            photoBase64 = photoSauve;
        }
    };

    function aperçuImage(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function() {
                document.getElementById('preview-photo').src = reader.result;
                document.getElementById('btn-supprimer').style.display = "block";
                photoBase64 = reader.result;
            };
            reader.readAsDataURL(file);
        }
    }

    // ✅ Supprimer la photo — remet le cercle vide
    function supprimerPhoto() {
        if (confirm("Supprimer ta photo de profil ?")) {
            photoBase64 = "";
            localStorage.removeItem("user_photo");
            document.getElementById('preview-photo').src = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('btn-supprimer').style.display = "none";
        }
    }

    function sauvegarderProfil() {
        const nom = document.getElementById("edit-nom").value.trim();
        const bio = document.getElementById("edit-bio").value.trim();
        const btn = document.getElementById('save-btn');
        
        if (nom === "") {
            alert("Oups ! Ton profil a besoin d'un nom.");
            return;
        }

        // Sauvegarde dans le stockage local
        localStorage.setItem("user_name", nom);
        localStorage.setItem("user_bio", bio);
        if (photoBase64 !== "") {
            localStorage.setItem("user_photo", photoBase64);
        }

        // Animation de chargement
        btn.innerText = "Synchronisation...";
        btn.style.opacity = "0.7";

        setTimeout(() => {
            window.location.href = "profil.html";
        }, 1000);
    }
</script>
</body>
</html>
